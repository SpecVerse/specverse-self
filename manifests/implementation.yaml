# SpecVerse Self-Specification Implementation Manifest
# Fastify + Prisma + PostgreSQL + React

manifests:
  SpecVerseSelfImplementation:
    specVersion: "3.3.0"
    name: "specverse-self-implementation"
    version: "1.0.0"
    description: "Implementation manifest for the SpecVerse self-specification"

    deployment:
      deploymentSource: "../specs/main.specly"
      deploymentName: "development"

    defaultMappings:
      storage: "PostgreSQL15"
      controller: "PrismaServices"
      service: "PrismaServices"
      routing: "FastifyAPI"
      orm: "PrismaORM"
      communication: "EventEmitter"

    capabilityMappings:
      # API Layer
      - capability: "api.rest"
        instanceFactory: "FastifyAPI"

      # Business Logic Layer
      - capability: "service.controller"
        instanceFactory: "PrismaServices"
      - capability: "service.business"
        instanceFactory: "PrismaServices"
      - capability: "service.crud"
        instanceFactory: "PrismaServices"

      # Data Layer
      - capability: "storage.database"
        instanceFactory: "PostgreSQL15"
      - capability: "orm.schema"
        instanceFactory: "PrismaORM"
      - capability: "orm.client"
        instanceFactory: "PrismaORM"
      - capability: "orm.prisma"
        instanceFactory: "PrismaORM"

      # Events
      - capability: "messaging.pubsub"
        instanceFactory: "EventEmitter"
      - capability: "messaging.events"
        instanceFactory: "EventEmitter"

      # Validation
      - capability: "validation.runtime"
        instanceFactory: "ZodValidation"
      - capability: "validation.schema"
        instanceFactory: "ZodValidation"

      # Scaffolding
      - capability: "project.scaffold"
        instanceFactory: "GenericScaffold"
      - capability: "app.entrypoint"
        instanceFactory: "GenericApp"

      # CLI
      - capability: "cli.commands"
        instanceFactory: "CommanderJS"

      # Frontend
      - capability: "app.frontend"
        instanceFactory: "ReactApp"
      - capability: "ui.components"
        instanceFactory: "ReactComponents"
      - capability: "ui.views"
        instanceFactory: "ReactComponents"
      - capability: "ui.forms"
        instanceFactory: "ReactComponents"

    configuration:
      outputStructure: "monorepo"
      frontendDir: "frontend"
      backendDir: "backend"
      apiBaseUrl: "http://localhost:3000"

      environments:
        development:
          database:
            provider: "postgresql"
            url: "postgresql://localhost:5432/specverse_self_dev"
          server:
            port: 3000
            host: "localhost"
            logLevel: "debug"
          features:
            hotReload: true
            debugMode: true

        production:
          database:
            provider: "postgresql"
            url: "${DATABASE_URL}"
          server:
            port: "${PORT:-8080}"
            host: "0.0.0.0"
            logLevel: "info"

      cors:
        origin: "*"
        credentials: true
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]

      validation:
        enabled: true
        provider: "zod"
        stripUnknown: true

      generation:
        outputDir: "./generated/code"
        typescript: true
        validation: true
        tests: false
        metadata:
          idStrategy: "uuid"
          auditFields: true
          softDeleteStrategy: "deletedAt"
