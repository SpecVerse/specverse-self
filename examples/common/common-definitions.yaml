components:
  CommonDefinitions:
    version: "3.2.0"
    description: "Example-specific composite types for SpecVerse examples"
    
    import:
      - from: "@specverse/primitives"
        select: [Money, PhoneNumber, Address]
    
    export:
      models: [ContactInfo, PersonName, ContactPerson, PaymentTerms, FileInfo, AuditEntry, KeyValuePair, ErrorInfo, Tag, SemanticVersion]

    models:
      # Contact information structure
      ContactInfo:
        description: "Complete contact information"
        attributes:
          email: Email
          phone: PhoneNumber
          address: Address optional
          preferredMethod: String default=email values=["email", "phone", "mail"]

      # Person name structure
      PersonName:
        description: "Person's full name"
        attributes:
          firstName: String required
          lastName: String required
          middleName: String
          prefix: String
          suffix: String

      # Contact person (name + contact info)
      ContactPerson:
        description: "Named contact person with information"
        attributes:
          title: String
          department: String
        relationships:
          name: belongsTo PersonName
          contact: belongsTo ContactInfo

      # Business and commerce types
      PaymentTerms:
        description: "Payment terms for business transactions"
        attributes:
          type: String required values=["net", "discount", "cod", "prepaid"]
          days: Integer required default=30
          discountPercent: String default=0
          discountDays: Integer default=0

      # File and media types
      FileInfo:
        description: "File metadata"
        attributes:
          filename: String required
          size: Integer required
          mimeType: String required
          checksum: String
          url: URL

      # Audit and tracking types
      AuditEntry:
        description: "Audit trail entry"
        attributes:
          timestamp: DateTime required
          userId: UUID required
          action: String required
          entityType: String required
          entityId: UUID required
          changes: Text
          ipAddress: String
          userAgent: String

      # Configuration and metadata types
      KeyValuePair:
        description: "Simple key-value pair"
        attributes:
          key: String required
          value: String required

      # Error and status types
      ErrorInfo:
        description: "Error information"
        attributes:
          code: String required
          message: String required
          details: Text
          timestamp: DateTime required

      # Tag and categorization
      Tag:
        description: "Categorization tag"
        attributes:
          name: String required
          category: String
          color: String default=blue

      # Version information
      SemanticVersion:
        description: "Semantic version following semver.org specification"
        attributes:
          major: Integer required default=0
          minor: Integer required default=0
          patch: Integer required default=0
          prerelease: String
          build: String

deployments: {}

# This file provides composite types specific to SpecVerse examples
# Business types (Money, PhoneNumber, etc.) are imported from @specverse/primitives
# Built-in types (UUID, Email, DateTime, etc.) don't need imports