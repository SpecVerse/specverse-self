# Learning Paths for different audiences
LearningPaths:
  - name: "Complete Beginner"
    description: "Start from zero SpecVerse knowledge"
    targetAudience: "developers new to SpecVerse"
    totalTime: "8-10 hours"
    steps:
      - order: 1
        category: "01-fundamentals"
        exampleIds: ["01-01-basic-model", "01-02-model-with-lifecycle"]
        checkpoints: ["Can define models with attributes", "Can add lifecycle states"]
        
      - order: 2
        category: "01-fundamentals"
        exampleIds: ["01-03-model-with-behaviors", "01-04-models-with-relations"]
        checkpoints: ["Can write behaviors with contracts", "Can create model relationships"]
        
      - order: 3
        category: "02-profiles"
        exampleIds: ["02-01-using-profiles"]
        checkpoints: ["Understands ProfileAttachment concept"]
        
      - order: 4
        category: "03-architecture"
        exampleIds: ["03-02-controllers-and-actions"]
        checkpoints: ["Can design API controllers"]

  - name: "Business Analyst"
    description: "Focus on domain modeling and business logic"
    targetAudience: "business analysts and domain experts"
    totalTime: "6-8 hours"
    steps:
      - order: 1
        category: "01-fundamentals"
        exampleIds: ["01-01-basic-model", "01-03-model-with-behaviors", "01-04-models-with-relations"]
        checkpoints: ["Understands domain modeling concepts"]
        
      - order: 2
        category: "02-profiles"
        exampleIds: ["02-01-using-profiles", "02-02-profile-attachment"]
        checkpoints: ["Can model flexible business requirements"]
        
      - order: 3
        category: "04-domains"
        exampleIds: ["04-01-digital-product-catalog", "04-02-organization-management"]
        checkpoints: ["Has seen complete domain examples"]

  - name: "Software Architect"
    description: "Focus on system design and implementation"
    targetAudience: "software architects and senior developers"
    totalTime: "10-12 hours"
    steps:
      - order: 1
        category: "01-fundamentals"
        exampleIds: ["01-01-basic-model", "01-02-model-with-lifecycle", "01-03-model-with-behaviors", "01-04-models-with-relations"]
        checkpoints: ["Solid foundation in SpecVerse modeling"]
        
      - order: 2
        category: "02-profiles"
        exampleIds: ["02-01-using-profiles", "02-02-profile-attachment"]
        checkpoints: ["Understands advanced composition patterns"]
        
      - order: 3
        category: "03-architecture"
        exampleIds: ["03-02-controllers-and-actions", "03-03-services-and-events", "03-04-views-and-components"]
        checkpoints: ["Can design complete system architectures"]
        
      - order: 4
        category: "04-domains"
        exampleIds: ["04-01-digital-product-catalog", "04-02-organization-management"]
        checkpoints: ["Understands real-world application patterns"]
        
      - order: 5
        category: "manifests"
        exampleIds: ["ecommerce-implementation"]
        checkpoints: ["Can plan production implementations"]

  - name: "Quick Overview"
    description: "Rapid introduction to key concepts"
    targetAudience: "experienced developers wanting quick introduction"
    totalTime: "3-4 hours"
    steps:
      - order: 1
        category: "01-fundamentals"
        exampleIds: ["01-01-basic-model", "01-03-model-with-behaviors"]
        checkpoints: ["Understands basic SpecVerse concepts"]
        
      - order: 2
        category: "02-profiles"
        exampleIds: ["02-01-using-profiles"]
        checkpoints: ["Grasps profile composition"]
        
      - order: 3
        category: "03-architecture"
        exampleIds: ["03-02-controllers-and-actions"]
        checkpoints: ["Sees system architecture approach"]
        
      - order: 4
        category: "04-domains"
        exampleIds: ["04-01-digital-product-catalog"]
        checkpoints: ["Understands complete application modeling"]

