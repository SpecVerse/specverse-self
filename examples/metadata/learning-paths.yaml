Application:
  Name: "SpecVerse Learning Path Generator"
  Version: "2.5.0"
  Description: "Personalized learning paths based on role, experience, and goals"

# Dynamic learning path configuration based on user characteristics
# This enables personalized learning experiences for different audiences

LearningPathTemplates:
  # Role-based paths
  business-analyst:
    name: "Business Analyst Path"
    description: "Focus on domain modeling and business requirements"
    emphasis: ["domain-modeling", "business-logic", "requirements"]
    skipTopics: ["technical-implementation", "deployment"]
    timeAllocation:
      fundamentals: 40%
      profiles: 30% 
      domains: 30%
      architecture: 20%
      manifests: 0%

  software-developer:
    name: "Software Developer Path"
    description: "Balanced technical and domain knowledge"
    emphasis: ["implementation", "architecture", "technical-patterns"]
    timeAllocation:
      fundamentals: 30%
      profiles: 25%
      domains: 20%
      architecture: 35%
      manifests: 25%

  solution-architect:
    name: "Solution Architect Path"
    description: "Comprehensive system design and implementation"
    emphasis: ["system-design", "architecture", "implementation", "deployment"]
    timeAllocation:
      fundamentals: 20%
      profiles: 25%
      domains: 25%
      architecture: 40%
      manifests: 40%

  technical-lead:
    name: "Technical Lead Path"
    description: "Leadership-focused with deep technical understanding"
    emphasis: ["architecture", "best-practices", "team-guidance", "implementation"]
    timeAllocation:
      fundamentals: 25%
      profiles: 30%
      domains: 30%
      architecture: 35%
      manifests: 35%

  # Experience-based modifiers
  beginner:
    modifier: "beginner"
    characteristics: ["needs-foundation", "step-by-step", "lots-of-examples"]
    pacing: "slow"
    extraTime: 50%
    requiredFoundation: ["01-01-basic-model", "01-02-model-with-lifecycle"]

  intermediate:
    modifier: "intermediate"
    characteristics: ["has-some-knowledge", "can-connect-concepts", "needs-context"]
    pacing: "moderate"
    extraTime: 20%
    canSkip: ["basic-syntax-review"]

  advanced:
    modifier: "advanced"
    characteristics: ["quick-learner", "understands-patterns", "wants-depth"]
    pacing: "fast"
    extraTime: -20%
    focus: ["advanced-patterns", "edge-cases", "optimization"]

  # Goal-based specializations  
  quick-evaluation:
    goal: "quick-evaluation"
    description: "Rapid overview for decision making"
    maxTime: "4 hours"
    mustInclude: ["01-01-basic-model", "02-01-using-profiles", "04-01-digital-product-catalog"]
    focus: ["key-concepts", "business-value", "differentiation"]

  production-implementation:
    goal: "production-implementation"
    description: "Comprehensive preparation for building real systems"
    minTime: "12 hours"
    mustInclude: ["all-fundamentals", "all-architecture", "domain-example", "manifest"]
    focus: ["implementation-details", "best-practices", "production-concerns"]

  team-training:
    goal: "team-training"
    description: "Prepare to teach SpecVerse to development team"
    emphasis: ["teaching-progression", "common-pitfalls", "practical-exercises"]
    extraMaterials: ["teaching-notes", "exercises", "troubleshooting"]

# Dynamic path generation rules
PathGenerationRules:
  # Prerequisite enforcement
  prerequisites:
    strictMode: true
    rules:
      - "Must complete 01-01-basic-model before any other example"
      - "Must complete fundamentals before profiles"
      - "Must complete profiles before advanced domains"
      - "Must complete architecture before manifests"

  # Adaptive pacing
  pacing:
    checkpoints:
      - after: "fundamentals"
        assess: ["model-understanding", "syntax-comfort"]
        adjust: ["slow-down-if-struggling", "speed-up-if-advanced"]
      
      - after: "profiles" 
        assess: ["composition-understanding", "business-logic-grasp"]
        adjust: ["add-practice-if-needed", "skip-repetition-if-solid"]

  # Personalization factors
  personalization:
    factors:
      - name: "domain-experience"
        levels: ["none", "some", "expert"]
        impact: "Examples selection and depth"
        
      - name: "specverse-experience"
        levels: ["none", "basic", "advanced"]
        impact: "Pacing and prerequisite strictness"
        
      - name: "time-availability"
        levels: ["limited", "moderate", "extensive"]
        impact: "Path length and depth"

# Sample generated paths
SamplePaths:
  novice-business-analyst:
    profile: "business-analyst + beginner + quick-evaluation"
    estimatedTime: "6 hours"
    path:
      - step: 1
        examples: ["01-01-basic-model"]
        focus: "Understand basic domain modeling"
        checkpoint: "Can define simple business entities"
        
      - step: 2  
        examples: ["01-03-model-with-behaviors"]
        focus: "Add business logic and rules"
        checkpoint: "Can express business requirements declaratively"
        
      - step: 3
        examples: ["02-01-using-profiles"]
        focus: "Understand flexible composition"
        checkpoint: "Sees how to handle business variations"
        
      - step: 4
        examples: ["04-01-digital-product-catalog"]
        focus: "Complete business domain example"
        checkpoint: "Understands real-world application"

  experienced-developer-implementation:
    profile: "software-developer + intermediate + production-implementation"
    estimatedTime: "10 hours"
    path:
      - step: 1
        examples: ["01-01-basic-model", "01-02-model-with-lifecycle", "01-03-model-with-behaviors"]
        focus: "Rapid foundation building"
        checkpoint: "Solid grasp of core concepts"
        
      - step: 2
        examples: ["01-04-models-with-relations", "02-01-using-profiles", "02-02-profile-attachment"]
        focus: "Advanced modeling patterns"
        checkpoint: "Can design complex domain models"
        
      - step: 3
        examples: ["03-02-controllers-and-actions", "03-03-services-and-events", "03-04-views-and-components"]
        focus: "System architecture and implementation"
        checkpoint: "Can design complete systems"
        
      - step: 4
        examples: ["04-01-digital-product-catalog", "04-02-organization-management"]
        focus: "Real-world pattern recognition"
        checkpoint: "Understands production patterns"
        
      - step: 5
        examples: ["ecommerce-implementation"]
        focus: "Implementation and deployment"
        checkpoint: "Ready for production development"

  architect-comprehensive:
    profile: "solution-architect + advanced + production-implementation"
    estimatedTime: "12 hours"
    path:
      - step: 1
        examples: ["01-01-basic-model", "01-02-model-with-lifecycle", "01-03-model-with-behaviors", "01-04-models-with-relations"]
        focus: "Comprehensive foundation"
        checkpoint: "Deep understanding of modeling"
        
      - step: 2
        examples: ["02-01-using-profiles", "02-02-profile-attachment"]
        focus: "Advanced composition and enterprise patterns"
        checkpoint: "Can design flexible architectures"
        
      - step: 3
        examples: ["03-02-controllers-and-actions", "03-03-services-and-events", "03-04-views-and-components"]
        focus: "Complete system architecture"
        checkpoint: "Masters full architecture stack"
        
      - step: 4
        examples: ["04-01-digital-product-catalog", "04-02-organization-management"]
        focus: "Domain expertise and pattern mastery"
        checkpoint: "Can handle complex business requirements"
        
      - step: 5
        examples: ["ecommerce-implementation"]
        focus: "Production implementation strategy"
        checkpoint: "Can lead production implementations"

# Usage instructions for learning path generation
UsageGuidelines:
  assessment:
    questions:
      - "What is your primary role? (business-analyst, software-developer, solution-architect, technical-lead)"
      - "What is your experience level? (beginner, intermediate, advanced)"
      - "What is your goal? (quick-evaluation, production-implementation, team-training)"
      - "How much time can you dedicate? (4 hours, 8 hours, 12+ hours)"
      - "Do you have domain modeling experience? (none, some, expert)"

  recommendations:
    - "Start with your role-based template"
    - "Adjust for experience level and available time"
    - "Follow prerequisites strictly for best learning outcomes"
    - "Use checkpoints to validate understanding before proceeding"
    - "Adapt pace based on comfort and comprehension"

# This system enables:
# 1. Personalized learning experiences based on role and experience
# 2. Adaptive pacing based on learner progress
# 3. Goal-oriented path optimization
# 4. Quality assurance through checkpoints
# 5. Efficient use of learning time